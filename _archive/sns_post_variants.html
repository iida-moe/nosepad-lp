<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Instagram投稿 デザイン案比較</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #666; padding: 48px; display: flex; gap: 48px; align-items: flex-start; font-family: 'Noto Sans JP', sans-serif; }
.col { display: flex; flex-direction: column; gap: 12px; }
.col-label { color: #fff; font-size: 13px; letter-spacing: 0.1em; font-family: sans-serif; }

.post {
  width: 540px;
  height: 540px;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
}

/* ══════════════════════
   A案：ミニマル・余白重視
══════════════════════ */
.post-a {
  background: #FDFAF5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 36px 40px 32px;
}
.post-a::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  border: 1px solid rgba(61,107,79,0.07);
  top: -180px; right: -180px;
}
.post-a .logos { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
.post-a .logos img { height: 26px; }
.post-a .logos .x { font-size: 12px; color: #C5B89A; }

.post-a .center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  position: relative; z-index: 1;
}
.post-a .pad-ring {
  width: 220px; height: 220px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 16px 56px rgba(0,0,0,0.09);
  border: 1.5px solid #9B001B;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.post-a .pad-inner { width: 192px; height: 192px; border-radius: 50%; overflow: hidden; background: #EDE5D5; }
.post-a .pad-inner img { width: 100%; height: 100%; object-fit: cover; }
.post-a .pad-ring svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 220px; height: 220px; }

.post-a .copy {
  text-align: center;
}
.post-a .copy .en { font-size: 9px; letter-spacing: 0.28em; color: rgba(61,107,79,0.45); text-transform: uppercase; margin-bottom: 6px; }
.post-a .copy h1 { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 600; color: #111; line-height: 1.6; letter-spacing: 0.02em; }
.post-a .copy h1 em { font-style: normal; color: #3D6B4F; }

.post-a .bottom { display: flex; align-items: center; justify-content: space-between; width: 100%; position: relative; z-index: 1; border-top: 1px solid #EDE5D5; padding-top: 14px; }
.post-a .bottom .price { font-family: 'Noto Serif JP', serif; font-size: 38px; font-weight: 600; color: #111; }
.post-a .bottom .price-note { font-size: 11px; color: #999; margin-top: 2px; }
.post-a .bottom .cta { font-size: 10px; letter-spacing: 0.16em; color: #3D6B4F; border: 1px solid rgba(61,107,79,0.3); border-radius: 100px; padding: 6px 14px; }


/* ══════════════════════
   B案：フルグリーン・ドラマティック
══════════════════════ */
.post-b {
  background: #3D6B4F;
}
.post-b::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.05);
  top: -200px; left: -200px;
}
.post-b::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
  bottom: -150px; right: -100px;
}
.post-b .logos {
  position: absolute;
  top: 32px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 14px; z-index: 2; white-space: nowrap;
}
.post-b .logos img { height: 26px; filter: brightness(0) invert(1) opacity(0.85); }
.post-b .logos .x { font-size: 12px; color: rgba(255,255,255,0.3); }

.post-b .pad-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -54%);
  width: 280px; height: 280px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.post-b .pad-inner { width: 244px; height: 244px; border-radius: 50%; overflow: hidden; background: #EDE5D5; box-shadow: 0 16px 56px rgba(0,0,0,0.3); }
.post-b .pad-inner img { width: 100%; height: 100%; object-fit: cover; }

.post-b .bottom-text {
  position: absolute;
  bottom: 40px; left: 0; right: 0;
  text-align: center; z-index: 2;
}
.post-b .bottom-text .headline { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 600; color: rgba(244,239,228,0.85); line-height: 1.6; margin-bottom: 10px; letter-spacing: 0.02em; }
.post-b .bottom-text .headline em { font-style: normal; color: #fff; }
.post-b .bottom-text .price-row { display: flex; align-items: baseline; gap: 8px; justify-content: center; }
.post-b .bottom-text .price { font-family: 'Noto Serif JP', serif; font-size: 52px; font-weight: 600; color: #fff; line-height: 1; }
.post-b .bottom-text .price-note { font-size: 14px; color: rgba(255,255,255,0.4); }


/* ══════════════════════
   C案：斜め分割・ダイナミック
══════════════════════ */
.post-c {
  background: #F4EFE4;
}
/* 斜めの緑ブロック */
.post-c::before {
  content: '';
  position: absolute;
  background: #3D6B4F;
  width: 130%; height: 130%;
  bottom: -30%; left: -15%;
  transform: rotate(-18deg);
  transform-origin: bottom left;
}

.post-c .logos {
  position: absolute;
  top: 32px; left: 36px;
  display: flex; align-items: center; gap: 12px; z-index: 3;
}
.post-c .logos img { height: 24px; }
.post-c .logos .x { font-size: 11px; color: #C5B89A; }

.post-c .pad-ring {
  position: absolute;
  top: 44%; left: 44%;
  transform: translate(-50%, -50%);
  width: 270px; height: 270px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 20px 70px rgba(0,0,0,0.18);
  border: 2px solid #9B001B;
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
  position: absolute;
}
.post-c .pad-inner { width: 236px; height: 236px; border-radius: 50%; overflow: hidden; background: #EDE5D5; }
.post-c .pad-inner img { width: 100%; height: 100%; object-fit: cover; }

.post-c .text-block {
  position: absolute;
  bottom: 36px; right: 32px;
  text-align: right; z-index: 3;
}
.post-c .text-block .headline { font-family: 'Noto Serif JP', serif; font-size: 19px; font-weight: 600; color: #F4EFE4; line-height: 1.65; margin-bottom: 8px; letter-spacing: 0.02em; }
.post-c .text-block .headline em { font-style: normal; opacity: 0.7; font-size: 16px; display: block; }
.post-c .text-block .price { font-family: 'Noto Serif JP', serif; font-size: 48px; font-weight: 600; color: #fff; line-height: 1; }
.post-c .text-block .price-note { font-size: 13px; color: rgba(244,239,228,0.45); margin-top: 4px; letter-spacing: 0.1em; }

.post-c .tag {
  position: absolute;
  top: 36px; right: 36px;
  font-size: 9px; letter-spacing: 0.24em;
  color: rgba(61,107,79,0.45); text-transform: uppercase; z-index: 3;
}
</style>
</head>
<body>

<!-- A案 -->
<div class="col">
  <p class="col-label">▼ A案 — ミニマル・余白重視</p>
  <div class="post post-a">
    <div class="logos">
      <img src="../images/AI.svg" alt="アイメガネ">
      <span class="x">×</span>
      <img src="../images/FA.svg" alt="phiten">
    </div>
    <div class="center">
      <div class="pad-ring">
        <div class="pad-inner"><img src="../images/maruM.jpg" alt="ノーズパッド"></div>
        <svg viewBox="0 0 220 220">
          <defs><path id="cpa" d="M110,110 m-90,0 a90,90 0 1,1 180,0 a90,90 0 1,1 -180,0"/></defs>
          <text font-family="'Noto Serif JP',serif" font-size="13" fill="#9B001B" letter-spacing="4" font-weight="600">
            <textPath href="#cpa" startOffset="6%">鼻あて替えてみませんか？</textPath>
          </text>
        </svg>
      </div>
      <div class="copy">
        <p class="en">Collaboration Nose Pad</p>
        <h1>いつものメガネに<br><em>ファイテンの技術</em>を</h1>
      </div>
    </div>
    <div class="bottom">
      <div>
        <div class="price">¥990</div>
        <p class="price-note">税込 / S · M · L</p>
      </div>
      <span class="cta">アイメガネ全店にて →</span>
    </div>
  </div>
</div>

<!-- B案 -->
<div class="col">
  <p class="col-label">▼ B案 — フルグリーン・ドラマティック</p>
  <div class="post post-b">
    <div class="logos">
      <img src="../images/AI.svg" alt="アイメガネ">
      <span class="x">×</span>
      <img src="../images/FA.svg" alt="phiten">
    </div>
    <div class="pad-ring">
      <div class="pad-inner"><img src="../images/maruM.jpg" alt="ノーズパッド"></div>
    </div>
    <div class="bottom-text">
      <h1 class="headline"><em>いつものメガネに</em>ファイテンの技術を</h1>
      <div class="price-row">
        <span class="price">¥990</span>
        <span class="price-note">円（税込）</span>
      </div>
    </div>
  </div>
</div>

<!-- C案 -->
<div class="col">
  <p class="col-label">▼ C案 — 斜め分割・ダイナミック</p>
  <div class="post post-c">
    <div class="logos">
      <img src="../images/AI.svg" alt="アイメガネ">
      <span class="x">×</span>
      <img src="../images/FA.svg" alt="phiten">
    </div>
    <span class="tag">New Item</span>
    <div class="pad-ring" style="top:44%;left:44%;transform:translate(-50%,-50%);position:absolute;">
      <div class="pad-inner"><img src="../images/maruM.jpg" alt="ノーズパッド"></div>
    </div>
    <div class="text-block">
      <h1 class="headline"><em>いつものメガネに</em>ファイテンの技術を</h1>
      <div class="price">¥990</div>
      <p class="price-note">円（税込）/ S · M · L</p>
    </div>
  </div>
</div>

</body>
</html>
