<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>A5 POP 最終版 – ミクロチタンボール ノーズパッド</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 148mm; height: 210mm; background: #fff; }

.pop {
  width: 148mm;
  height: 210mm;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: 'Noto Sans JP', sans-serif;
}

/* ── 上半分：サンド ── */
.upper {
  background: #F4EFE4;
  flex: 1.1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 26px 28px 22px;
  gap: 14px;
  position: relative;
  overflow: hidden;
}
.upper::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  border: 1px solid rgba(61,107,79,0.1);
  top: -100px; right: -100px;
  pointer-events: none;
}
.upper::after {
  content: '';
  position: absolute;
  width: 180px; height: 180px;
  border-radius: 50%;
  border: 1px solid rgba(61,107,79,0.07);
  bottom: -60px; left: -60px;
  pointer-events: none;
}

.logos {
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative; z-index: 1;
}
.logos img { height: 44px; width: auto; }
.logos .x { font-size: 15px; color: #C5B89A; font-weight: 300; }

.collab-label {
  font-size: 7.5px;
  letter-spacing: 0.32em;
  color: rgba(61,107,79,0.5);
  text-transform: uppercase;
  font-weight: 500;
  position: relative; z-index: 1;
}

.sep {
  width: 1px; height: 20px;
  background: #DDD5C5;
  position: relative; z-index: 1;
}

.product-circle {
  width: 148px; height: 148px;
  border-radius: 50%;
  overflow: hidden;
  background: #EDE5D5;
  box-shadow: 0 12px 36px rgba(0,0,0,0.12);
  position: relative; z-index: 1;
}
.product-circle img { width: 100%; height: 100%; object-fit: cover; }

.product-name {
  font-size: 7.5px;
  letter-spacing: 0.26em;
  color: rgba(61,107,79,0.5);
  text-transform: uppercase;
  position: relative; z-index: 1;
}

/* ── 下半分：ミディアムグリーン ── */
.lower {
  background: #3D6B4F;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 32px;
  position: relative;
  overflow: hidden;
}
.lower::before {
  content: '';
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
  bottom: -100px; right: -80px;
  pointer-events: none;
}
.lower::after {
  content: '';
  position: absolute;
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
  top: -60px; left: -40px;
  pointer-events: none;
}

.headline {
  font-family: 'Noto Serif JP', serif;
  font-size: 17.5px;
  font-weight: 600;
  color: #F4EFE4;
  line-height: 1.7;
  text-align: center;
  letter-spacing: 0.03em;
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.headline em {
  font-style: normal;
  color: #F4A0A0;
}

.price {
  font-family: 'Noto Serif JP', serif;
  font-size: 38px;
  font-weight: 600;
  color: #F4A0A0;
  line-height: 1;
  margin-bottom: 4px;
  position: relative; z-index: 1;
}
.price-note {
  font-size: 10px;
  color: rgba(244,239,228,0.4);
  margin-bottom: 20px;
  letter-spacing: 0.1em;
  position: relative; z-index: 1;
}

.cta {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 14px 12px;
  text-align: center;
  margin-bottom: 12px;
  position: relative; z-index: 1;
}
.cta-main {
  font-size: 13px;
  font-weight: 500;
  color: #F4EFE4;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.cta-sub {
  font-size: 9px;
  color: rgba(244,239,228,0.45);
  letter-spacing: 0.1em;
  line-height: 1.7;
}

.footer-note {
  font-size: 7.5px;
  color: rgba(244,239,228,0.3);
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.8;
  position: relative; z-index: 1;
}

@media print {
  html, body { width: 148mm; height: 210mm; }
}
</style>
</head>
<body>
<div class="pop">

  <div class="upper">
    <div class="logos">
      <img src="../images/FA.svg" alt="phiten">
      <span class="x">×</span>
      <img src="../images/AI.svg" alt="アイメガネ">
    </div>
    <p class="collab-label">Collaboration Item</p>
    <div class="sep"></div>
    <div class="product-circle">
      <img src="../images/maruM.jpg" alt="ノーズパッド">
    </div>
    <p class="product-name">Micro Titanium Ball Nose Pad</p>
  </div>

  <div class="lower">
    <h1 class="headline">
      いつものメガネに、<br>
      <em>ファイテンの技術</em>を。
    </h1>
    <div class="price">¥990</div>
    <p class="price-note">税込 / S · M · L 全サイズ共通</p>
    <div class="cta">
      <p class="cta-main">ご試着・ご購入はスタッフへ</p>
      <p class="cta-sub">サイズ選びもお気軽にご相談ください</p>
    </div>
    <p class="footer-note">
      アイメガネ全店（本庄南大通り店を除く）にてお取り扱い中
    </p>
  </div>

</div>
</body>
</html>
