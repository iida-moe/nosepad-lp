<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コラボ投稿 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1080px; }

.canvas {
  width: 1080px;
  height: 1080px;
  background: #F4EFE4;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
}

/* 背景：右上グリーン斜め */
.bg-green {
  position: absolute;
  top: 0; right: 0;
  width: 520px; height: 520px;
  background: #3D6B4F;
  clip-path: polygon(100% 0, 100% 100%, 0 0);
  z-index: 0;
}

/* 背景装飾円 */
.bg-arc {
  position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  border: 1px solid rgba(61,107,79,0.08);
  bottom: -280px; left: -200px;
  z-index: 0;
}

/* ── コラボロゴエリア（上部中央） ── */
.collab-header {
  position: absolute;
  top: 72px; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  z-index: 3;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 32px;
}
.logo-row img { height: 52px; width: auto; }
.logo-row .times {
  font-size: 36px;
  color: #C5B89A;
  font-weight: 300;
  line-height: 1;
}

.collab-label {
  font-size: 18px;
  letter-spacing: 0.38em;
  color: rgba(61,107,79,0.5);
  text-transform: uppercase;
}

/* ── パッド：中央 ── */
.pad-wrap {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -52%);
  z-index: 2;
}
.pad-outer {
  width: 540px; height: 540px;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 32px 100px rgba(0,0,0,0.11);
  border: 2.5px solid #9B001B;
  position: relative;
}
.pad-circle {
  width: 480px; height: 480px;
  border-radius: 50%;
  overflow: hidden;
  background: #EDE5D5;
}
.pad-circle img { width: 100%; height: 100%; object-fit: cover; }

/* 円周テキスト */
.pad-outer svg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 540px; height: 540px;
}

/* ── NEW ITEM バッジ（右上） ── */
.badge {
  position: absolute;
  top: 68px; right: 72px;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.badge-inner {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: #3D6B4F;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
}
.badge-new {
  font-size: 13px; letter-spacing: 0.22em;
  color: rgba(244,239,228,0.6); text-transform: uppercase;
}
.badge-item {
  font-size: 11px; letter-spacing: 0.18em;
  color: rgba(244,239,228,0.45); text-transform: uppercase;
}

/* ── ボトムバー ── */
.bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #3D6B4F;
  padding: 28px 64px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 3;
}

.bottom-left .eyebrow {
  font-size: 15px; letter-spacing: 0.24em;
  color: rgba(244,239,228,0.38);
  text-transform: uppercase; margin-bottom: 6px;
}
.bottom-left .headline {
  font-family: 'Noto Serif JP', serif;
  font-size: 36px; font-weight: 600;
  color: #F4EFE4; line-height: 1.45;
  letter-spacing: 0.02em;
}
.bottom-left .headline em {
  font-style: normal;
  color: rgba(244,239,228,0.72);
  font-size: 30px; display: block;
}

.bottom-right { text-align: right; flex-shrink: 0; }
.bottom-right .price {
  font-family: 'Noto Serif JP', serif;
  font-size: 80px; font-weight: 600;
  color: #fff; line-height: 1;
  letter-spacing: -0.01em;
}
.bottom-right .price-sub {
  font-size: 17px; color: rgba(244,239,228,0.4);
  letter-spacing: 0.1em; margin-top: 4px;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-green"></div>
  <div class="bg-arc"></div>

  <!-- コラボヘッダー -->
  <div class="collab-header">
    <div class="logo-row">
      <img src="../images/AI.svg" alt="アイメガネ">
      <span class="times">×</span>
      <img src="../images/FA.svg" alt="phiten">
    </div>
    <p class="collab-label">Collaboration Item</p>
  </div>

  <!-- NEW バッジ -->
  <div class="badge">
    <div class="badge-inner">
      <span class="badge-new">NEW</span>
      <span class="badge-item">ITEM</span>
    </div>
  </div>

  <!-- パッド -->
  <div class="pad-wrap">
    <div class="pad-outer">
      <div class="pad-circle">
        <img src="../images/maruM.jpg" alt="ノーズパッド">
      </div>
      <svg viewBox="0 0 540 540">
        <defs>
          <path id="cp" d="M270,270 m-224,0 a224,224 0 1,1 448,0 a224,224 0 1,1 -448,0"/>
        </defs>
        <text font-family="'Noto Serif JP',serif" font-size="30" fill="#9B001B" letter-spacing="10" font-weight="600">
          <textPath href="#cp" startOffset="6%">鼻あて替えてみませんか？</textPath>
        </text>
      </svg>
    </div>
  </div>

  <!-- ボトムバー -->
  <div class="bottom">
    <div class="bottom-left">
      <p class="eyebrow">Nose Pad</p>
      <h1 class="headline">
        <em>いつものメガネに</em>
        ファイテンの技術を
      </h1>
    </div>
    <div class="bottom-right">
      <div class="price">¥990</div>
      <p class="price-sub">税込 / S · M · L</p>
    </div>
  </div>
</div>
</body>
</html>
