<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>A5 POP 最終版v2 – メガネ写真あり</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 148mm; height: 210mm; background: #fff; }

.pop {
  width: 148mm;
  height: 210mm;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: 'Noto Sans JP', sans-serif;
}

/* ── 上半分：サンド ── */
.upper {
  background: #F4EFE4;
  flex: 1.15;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 24px 16px;
  gap: 12px;
  position: relative;
  overflow: hidden;
}
.upper::before {
  content: '';
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  border: 1px solid rgba(61,107,79,0.09);
  top: -90px; right: -90px;
  pointer-events: none;
}

/* ロゴ */
.logos {
  display: flex;
  align-items: center;
  gap: 18px;
  position: relative; z-index: 1;
}
.logos img { height: 40px; width: auto; }
.logos .x { font-size: 14px; color: #C5B89A; font-weight: 300; }

.collab-label {
  font-size: 7px;
  letter-spacing: 0.32em;
  color: rgba(61,107,79,0.5);
  text-transform: uppercase;
  position: relative; z-index: 1;
}

.sep { width: 32px; height: 1px; background: #DDD5C5; position: relative; z-index: 1; }

/* 写真エリア：パッド主役・メガネ補足 */
.photo-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative; z-index: 1;
  width: 100%;
}

/* パッド：大きく中央 */
.pad-main {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pad-circle {
  width: 130px; height: 130px;
  border-radius: 50%;
  overflow: hidden;
  background: #EDE5D5;
  box-shadow: 0 10px 36px rgba(0,0,0,0.13);
  border: 3px solid #fff;
}
.pad-circle img { width: 100%; height: 100%; object-fit: cover; }

.pad-badge {
  position: absolute;
  bottom: 2px; right: -8px;
  background: #3D6B4F;
  color: #F4EFE4;
  font-size: 7px;
  letter-spacing: 0.14em;
  padding: 4px 10px;
  border-radius: 100px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* メガネ：小さく横長で補足 */
.glasses-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(237,229,213,0.6);
  border: 1px solid #DDD5C5;
  border-radius: 8px;
  padding: 7px 10px;
  width: 100%;
}
.glasses-sub-img {
  width: 80px; height: 52px;
  border-radius: 5px;
  overflow: hidden;
  background: #EDE5D5;
  flex-shrink: 0;
}
.glasses-sub-img img { width: 100%; height: 100%; object-fit: cover; }
.glasses-sub-text {
  font-size: 8px;
  color: rgba(61,107,79,0.65);
  letter-spacing: 0.1em;
  line-height: 1.7;
}

/* 下半分：ミディアムグリーン */
.lower {
  background: #3D6B4F;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 30px;
  position: relative;
  overflow: hidden;
}
.lower::before {
  content: '';
  position: absolute;
  width: 260px; height: 260px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.05);
  bottom: -90px; right: -70px;
  pointer-events: none;
}

.headline {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  font-weight: 600;
  color: #F4EFE4;
  line-height: 1.7;
  text-align: center;
  letter-spacing: 0.03em;
  margin-bottom: 12px;
  position: relative; z-index: 1;
}
.headline em { font-style: normal; color: #F4A0A0; }

.price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  justify-content: center;
  margin-bottom: 16px;
  position: relative; z-index: 1;
}
.price {
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  font-weight: 600;
  color: #F4A0A0;
  line-height: 1;
}
.price-note { font-size: 10px; color: rgba(244,239,228,0.4); letter-spacing: 0.08em; }

.cta {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 13px 12px;
  text-align: center;
  margin-bottom: 10px;
  position: relative; z-index: 1;
}
.cta-main {
  font-size: 13px;
  font-weight: 500;
  color: #F4EFE4;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.cta-sub {
  font-size: 9px;
  color: rgba(244,239,228,0.45);
  letter-spacing: 0.1em;
}

.footer-note {
  font-size: 7.5px;
  color: rgba(244,239,228,0.3);
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.8;
  position: relative; z-index: 1;
}

@media print {
  html, body { width: 148mm; height: 210mm; }
}
</style>
</head>
<body>
<div class="pop">

  <div class="upper">
    <div class="logos">
      <img src="../images/FA.svg" alt="phiten">
      <span class="x">×</span>
      <img src="../images/AI.svg" alt="アイメガネ">
    </div>
    <p class="collab-label">Collaboration Item</p>
    <div class="sep"></div>

    <div class="photo-area">
      <div class="pad-main">
        <div class="pad-circle">
          <img src="../images/maruM.jpg" alt="ノーズパッド">
        </div>
        <span class="pad-badge">本品 ノーズパッド</span>
      </div>
      <div class="glasses-sub">
        <div class="glasses-sub-img">
          <img src="../images/unnamed1.jpg" alt="装着イメージ">
        </div>
        <p class="glasses-sub-text">メガネの鼻あてに<br>取り付けるだけ</p>
      </div>
    </div>
  </div>

  <div class="lower">
    <h1 class="headline">
      いつものメガネに、<br>
      <em>ファイテンの技術</em>を。
    </h1>
    <div class="price-row">
      <span class="price">¥990</span>
      <span class="price-note">税込 / S · M · L</span>
    </div>
    <div class="cta">
      <p class="cta-main">ご試着・ご購入はスタッフへ</p>
      <p class="cta-sub">サイズ選びもお気軽にご相談ください</p>
    </div>
    <p class="footer-note">アイメガネ全店（本庄南大通り店を除く）にてお取り扱い中</p>
  </div>

</div>
</body>
</html>
