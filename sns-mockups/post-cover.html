<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Post COVER 1080×1080 - ノーズパッド</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
  :root {
    --red:       #B8000A;
    --red-pale:  #FBF0EE;
    --cream:     #FAF6EC;
    --ink:       #111;
    --ink-mid:   #444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 20px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .post {
    width: 1080px; height: 1080px; position: relative;
    overflow: hidden;
    transform-origin: top center; transform: scale(0.55);
    background: var(--cream);
    color: var(--ink);
  }

  /* A: Full-bleed product photo (top 60%) */
  .photo-zone {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 640px;
    overflow: hidden;
    background: #e8e8e8;
  }
  .photo-zone img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 40%;
  }
  /* 下部グラデで文字読みやすく */
  .photo-zone::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.35) 100%);
  }

  /* Logos pill top-left */
  .logos-pill {
    position: absolute;
    top: 40px; left: 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: #fff;
    padding: 12px 28px;
    border-radius: 100px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    z-index: 10;
  }
  .logo-aimegane { height: 38px; width: auto; }
  .logo-phiten { height: 24px; width: auto; padding: 0 8px; }
  .times { font-size: 18px; font-weight: 300; color: var(--ink-mid); }

  /* NEW badge top-right */
  .new-badge {
    position: absolute;
    top: 48px; right: 40px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #fff;
    padding: 10px 20px;
    background: var(--red);
    border-radius: 3px;
    box-shadow: 0 6px 20px rgba(184,0,10,0.35);
    z-index: 10;
  }

  /* Magazine-style headline on photo */
  .photo-headline {
    position: absolute;
    bottom: 40px; left: 48px; right: 48px;
    z-index: 5;
    color: #fff;
  }
  .photo-headline .sub {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    opacity: 0.9;
    margin-bottom: 10px;
  }
  .photo-headline h1 {
    font-size: 56px;
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }

  /* Info zone (bottom 40%) */
  .info-zone {
    position: absolute;
    top: 640px; left: 0; right: 0;
    bottom: 60px;
    background: var(--cream);
    padding: 50px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
  }
  .info-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .product-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.08em;
  }
  .price-wrap {
    display: inline-flex;
    align-items: baseline;
  }
  .price-yen {
    font-size: 30px;
    font-weight: 700;
    color: var(--red);
    margin-right: 4px;
    line-height: 1;
  }
  .price-num {
    font-size: 90px;
    font-weight: 900;
    color: var(--red);
    line-height: 0.9;
    letter-spacing: -0.02em;
  }
  .price-unit {
    font-size: 16px;
    color: var(--ink-mid);
    letter-spacing: 0.06em;
    margin-left: 6px;
  }
  .price-meta {
    font-size: 13px;
    color: var(--ink-mid);
    letter-spacing: 0.06em;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: var(--red);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 20px 36px;
    border-radius: 100px;
    box-shadow: 0 10px 28px rgba(184,0,10,0.3);
    flex-shrink: 0;
  }
  .cta-btn::after {
    content: "";
    width: 11px; height: 11px;
    margin-left: 14px;
    border-top: 2.5px solid #fff;
    border-right: 2.5px solid #fff;
    transform: rotate(45deg);
  }

  /* Bottom band */
  .bottom-band {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .store-note {
    font-size: 13px;
    color: #fff;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="post">

  <div class="photo-zone">
    <img src="../images/maruM.jpg" alt="ノーズパッド">
    <div class="photo-headline">
      <p class="sub">リラックス＆リカバリーをサポートする<br>ファイテンの技術をノーズパッドに採用。</p>
      <h1>かけ心地が、変わる。</h1>
    </div>
  </div>

  <div class="logos-pill">
    <img class="logo-aimegane" src="../images/AI.svg" alt="アイメガネ">
    <span class="times">×</span>
    <img class="logo-phiten" src="../images/phiten-logo.png" alt="phiten">
  </div>

  <span class="new-badge">NEW</span>

  <div class="info-zone">
    <div class="info-left">
      <p class="product-name">ミクロチタンボール ノーズパッド</p>
      <div class="price-wrap">
        <span class="price-yen">¥</span>
        <span class="price-num">990</span>
        <span class="price-unit">（税込）</span>
      </div>
      <p class="price-meta">S・M・L 全サイズ共通</p>
    </div>
    <a class="cta-btn">店舗を探す</a>
  </div>

  <div class="bottom-band">
    <p class="store-note">本庄南大通り店を除く、アイメガネ全店にて販売中</p>
  </div>

</div>

</body>
</html>
