<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Post VISUAL 1080×1080 - ノーズパッド</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
  :root {
    --red:        #B8000A;
    --red-pale:   #FBF0EE;
    --blue-line:  #7AA8C5;
    --blue-pale:  #EBF2FA;
    --ink:        #111;
    --ink-mid:    #444;
    --ink-light:  #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 20px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .post {
    width: 1080px; height: 1080px; position: relative;
    overflow: hidden;
    transform-origin: top center; transform: scale(0.55);
    background: var(--blue-pale);
    color: var(--ink);
  }

  /* Upper zone: blue-pale */
  .zone-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 640px;
    background: var(--blue-pale);
    padding: 40px 0 0;
  }

  /* 光の広がり */
  .zone-top::before {
    content: "";
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.1) 55%, transparent 75%);
    pointer-events: none;
  }

  /* Logos pill */
  .top-logos {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: #fff;
    width: fit-content;
    margin: 0 auto;
    padding: 14px 40px;
    border-radius: 100px;
    box-shadow: 0 6px 20px rgba(0,53,148,0.08);
  }
  .logo-aimegane { height: 44px; width: auto; }
  .logo-phiten { height: 28px; width: auto; padding: 0 10px; }
  .times { font-size: 22px; font-weight: 300; color: var(--ink-mid); }

  /* NEW tag */
  .tag-new {
    position: absolute;
    top: 130px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--red);
    padding: 7px 18px;
    background: #fff;
    border-radius: 3px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.04);
  }

  /* 商品：丸重ね構図（ゾーンを跨ぐ） */
  .product-wrap {
    position: absolute;
    top: 180px; left: 50%;
    transform: translateX(-50%);
    width: 720px; height: 560px;
    z-index: 10;
  }
  .product-main {
    position: absolute;
    top: 0; left: 30px;
    width: 440px; height: 440px;
    border-radius: 50%;
    overflow: hidden;
    border: 5px solid #fff;
    box-shadow: 0 22px 56px rgba(0,53,148,0.22);
    background: #fff;
    z-index: 1;
  }
  .product-main img { width: 100%; height: 100%; object-fit: cover; }
  .product-sub {
    position: absolute;
    right: 0; top: 300px;
    width: 240px; height: 240px;
    z-index: 2;
    transform: rotate(4deg);
  }
  .product-sub img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #fff;
    box-shadow: 0 14px 40px rgba(0,53,148,0.26);
  }
  .sub-caption {
    position: absolute;
    bottom: -26px; left: 0; right: 0;
    font-size: 11px;
    color: rgba(0,0,0,0.38);
    letter-spacing: 0.04em;
    text-align: center;
    transform: rotate(-4deg);
  }

  /* Lower zone: white with curve */
  .zone-bottom {
    position: absolute;
    top: 640px; left: 0; right: 0;
    bottom: 60px;
    background: #fff;
    padding: 95px 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    border-top-left-radius: 50px;
    border-top-right-radius: 50px;
  }

  /* Product name with red accent */
  .product-name-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 14px;
  }
  .product-name-line {
    width: 24px;
    height: 2px;
    background: var(--red);
    margin-bottom: 10px;
  }
  .product-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.08em;
  }

  .lead {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink-mid);
    line-height: 1.6;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
  }
  .headline {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: 0.02em;
    margin-bottom: 18px;
  }
  .headline em {
    font-style: normal;
    color: var(--red);
  }

  .info-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }
  .price-wrap {
    display: inline-flex;
    align-items: baseline;
  }
  .price-yen {
    font-size: 24px;
    font-weight: 700;
    color: var(--red);
    margin-right: 3px;
    line-height: 1;
  }
  .price-num {
    font-size: 70px;
    font-weight: 900;
    color: var(--red);
    line-height: 0.9;
    letter-spacing: -0.02em;
  }
  .price-unit {
    font-size: 14px;
    color: var(--ink-mid);
    letter-spacing: 0.06em;
    margin-left: 6px;
  }
  .price-meta {
    font-size: 13px;
    color: var(--ink-mid);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }
  .price-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: var(--red);
    color: #fff;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 16px 34px;
    border-radius: 100px;
    box-shadow: 0 10px 26px rgba(184,0,10,0.28);
  }
  .cta-btn::after {
    content: "";
    width: 10px; height: 10px;
    margin-left: 12px;
    border-top: 2.5px solid #fff;
    border-right: 2.5px solid #fff;
    transform: rotate(45deg);
  }

  /* Bottom band */
  .bottom-band {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .store-note {
    font-size: 13px;
    color: #fff;
    letter-spacing: 0.06em;
    text-align: center;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="post">

  <!-- Upper zone -->
  <div class="zone-top">
    <div class="top-logos">
      <img class="logo-aimegane" src="../images/AI.svg" alt="アイメガネ">
      <span class="times">×</span>
      <img class="logo-phiten" src="../images/phiten-logo.png" alt="phiten">
    </div>
    <span class="tag-new">NEW ／ 店頭にて販売中</span>
  </div>

  <!-- Product (straddles zones) -->
  <div class="product-wrap">
    <div class="product-main">
      <img src="../images/maruM.jpg" alt="ノーズパッド">
    </div>
    <div class="product-sub">
      <img src="../images/unnamed1.jpg" alt="装着イメージ">
      <p class="sub-caption">※装着はイメージです</p>
    </div>
  </div>

  <!-- Lower zone -->
  <div class="zone-bottom">
    <div class="product-name-wrap">
      <span class="product-name-line"></span>
      <p class="product-name">ミクロチタンボール ノーズパッド</p>
    </div>
    <p class="lead">リラックス＆リカバリーをサポートする<br>ファイテンの技術をノーズパッドに採用。</p>
    <h1 class="headline">かけ心地が、<em>変わる。</em></h1>

    <div class="info-row">
      <div class="price-block">
        <div class="price-wrap">
          <span class="price-yen">¥</span>
          <span class="price-num">990</span>
          <span class="price-unit">（税込）</span>
        </div>
        <p class="price-meta">S・M・L 全サイズ共通</p>
      </div>
      <a class="cta-btn">最寄り店舗を探す</a>
    </div>
  </div>

  <div class="bottom-band">
    <p class="store-note">本庄南大通り店を除く、アイメガネ全店にて販売中</p>
  </div>

</div>

</body>
</html>
