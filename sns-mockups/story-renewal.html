<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インスタストーリー用リニューアル 1080×1920</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
  :root {
    --red:  #B8000A;
    --ink:  #111111;
    --gray: #666666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .story {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    transform-origin: top center;
    transform: scale(0.36);
    background: #fff;
    flex-shrink: 0;
  }

  /* ── ヘッダー（ロゴ） ── */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 130px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    border-bottom: 1.5px solid #eee;
    z-index: 20;
  }
  .logo-ai  { height: 44px; width: auto; }
  .logo-ph  { height: 28px; width: auto; }
  .times    { font-size: 22px; color: #bbb; font-weight: 300; }

  /* ── NEWバッジ ── */
  .new-badge {
    position: absolute;
    top: 44px; right: 56px;
    background: var(--red);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3em;
    padding: 10px 22px;
    border-radius: 3px;
    z-index: 30;
  }

  /* ── 写真ゾーン ── */
  .photo {
    position: absolute;
    top: 130px; left: 0; right: 0;
    height: 820px;
    overflow: hidden;
    background: #111;
  }
  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }
  .photo::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 320px;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 100%);
  }

  /* ── 写真下端テキスト ── */
  .photo-text {
    position: absolute;
    bottom: 48px; left: 64px; right: 64px;
    z-index: 10;
    color: #fff;
  }
  .photo-text .eyebrow {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.15em;
    opacity: 0.85;
    margin-bottom: 16px;
  }
  .photo-text h1 {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.22;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.4);
  }

  /* ── 白コンテンツゾーン ── */
  .content {
    position: absolute;
    top: 950px; left: 0; right: 0;
    bottom: 0;
    background: #fff;
    padding: 64px 72px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* 上段：商品情報 */
  .product-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .accent-line {
    width: 52px;
    height: 4px;
    background: var(--red);
    border-radius: 2px;
  }
  .product-name {
    font-size: 20px;
    font-weight: 500;
    color: var(--gray);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .sub-desc {
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.6;
    letter-spacing: 0.04em;
  }

  /* 価格行 */
  .price-section {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .price-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .price-label {
    font-size: 18px;
    font-weight: 500;
    color: var(--gray);
    letter-spacing: 0.08em;
  }
  .price {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .price-yen { font-size: 36px; font-weight: 700; color: var(--red); }
  .price-num { font-size: 108px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: -0.03em; }
  .price-tax { font-size: 20px; color: var(--gray); margin-left: 6px; }

  .sizes {
    display: flex;
    gap: 12px;
    padding-bottom: 8px;
  }
  .size-tag {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  /* CTAボタン */
  .cta-btn {
    background: var(--red);
    color: #fff;
    border-radius: 10px;
    padding: 48px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cta-main {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .cta-sub {
    font-size: 19px;
    font-weight: 400;
    opacity: 0.82;
    letter-spacing: 0.06em;
  }

  .note {
    text-align: center;
    font-size: 17px;
    color: #bbb;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div class="story">

  <!-- ヘッダー -->
  <div class="header">
    <img class="logo-ai" src="../images/AI.svg" alt="アイメガネ">
    <span class="times">×</span>
    <img class="logo-ph" src="../images/phiten-logo.png" alt="phiten">
  </div>

  <span class="new-badge">NEW</span>

  <!-- 写真 -->
  <div class="photo">
    <img src="../images/nosepad-close.png" alt="ノーズパッド装着イメージ">
    <div class="photo-text">
      <p class="eyebrow">ファイテンのミクロチタンボール技術</p>
      <h1>鼻あて、<br>替えてみませんか？</h1>
    </div>
  </div>

  <!-- 白コンテンツ -->
  <div class="content">

    <div class="product-section">
      <div class="accent-line"></div>
      <p class="product-name">Microtitanball Nose Pad</p>
      <p class="sub-desc">リラックス＆リカバリーを<br>サポートするノーズパッド</p>
    </div>

    <div class="price-section">
      <div class="price-wrap">
        <span class="price-label">税込価格</span>
        <div class="price">
          <span class="price-yen">¥</span>
          <span class="price-num">990</span>
          <span class="price-tax">税込</span>
        </div>
      </div>
      <div class="sizes">
        <span class="size-tag">S</span>
        <span class="size-tag">M</span>
        <span class="size-tag">L</span>
      </div>
    </div>

    <div class="cta-btn">
      <span class="cta-main">アイメガネ店頭にてお取り扱い中</span>
      <span class="cta-sub">詳細はプロフィールリンクへ →</span>
    </div>

    <p class="note">※本庄南大通り店を除く</p>
    <p class="note" style="margin-top:4px;">※本商品はファイテン社の独自技術を取り入れたコラボレーション商品です</p>

  </div>

</div>

</body>
</html>
